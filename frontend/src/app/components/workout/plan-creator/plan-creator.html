<div class="flex-1 min-h-0 p-8 lg:p-12 overflow-y-auto custom-scrollbar">
    <div class="max-w-4xl mx-auto space-y-8">
        <div class="mb-10 lg:mb-12">
            <h1 class="text-3xl sm:text-4xl lg:text-5xl font-black uppercase tracking-tight mb-2 flex flex-col">
                <span class="text-white drop-shadow-sm">{{isEditMode ? 'EDIT WORKOUT' : 'CREATE WORKOUT'}} <span
                        class="text-theme-accent">PLAN</span></span>
            </h1>
            <p class="text-theme-text-muted font-bold text-xs uppercase tracking-widest">{{isEditMode ? 'Update your
                routine settings.' : 'Design your routine and sets targets for the AI coach.'}}</p>
        </div>

        <datalist id="past-exercises">
            <option *ngFor="let pEx of pastExercises" [value]="pEx.name"></option>
        </datalist>

        <!-- Form -->
        <form [formGroup]="planForm" (ngSubmit)="onSubmit()" class="space-y-8">
            <!-- Plan Name Card -->
            <div class="bg-theme-bg border border-theme-border rounded-2xl p-8 space-y-6">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-3">Plan
                        Name</label>
                    <input type="text" formControlName="name" placeholder="e.g. Push Day A"
                        class="w-full bg-theme-card-hover border border-theme-border rounded-2xl px-6 py-4 text-theme-text placeholder-theme-text-muted focus:outline-none focus:border-theme-accent border focus:border-theme-accent transition-all">
                </div>
            </div>

            <!-- Exercises Section -->
            <div class="space-y-6">
                <div class="flex items-center justify-between px-2">
                    <h2 class="text-xl font-bold ">Exercises</h2>
                    <button type="button" (click)="addExercise()"
                        class="px-4 py-2 bg-theme-accent/10 text-theme-accent hover:bg-theme-accent/10 rounded-xl text-sm font-bold transition-all border border-theme-accent/20">
                        + Add Exercise
                    </button>
                </div>

                <div formArrayName="exercises" class="space-y-4">
                    <div *ngFor="let exercise of exercises.controls; let i = index" [formGroupName]="i"
                        class="bg-theme-bg border border-theme-border rounded-2xl p-8 animate-in fade-in slide-in-from-bottom-4 group">

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-6">
                            <!-- Drag/Order Indicator -->
                            <div
                                class="lg:col-span-1 flex flex-col items-center justify-center space-y-2 border-r border-theme-border pr-4">
                                <span class="text-2xl font-black text-theme-text/20">#{{i + 1}}</span>
                                <div class="flex flex-col space-y-1">
                                    <button type="button" (click)="moveExercise(i, 'up')" [disabled]="i === 0"
                                        class="p-1 hover:text-theme-accent disabled:opacity-0 transition-all">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <path d="m18 15-6-6-6 6" />
                                        </svg>
                                    </button>
                                    <button type="button" (click)="moveExercise(i, 'down')"
                                        [disabled]="i === exercises.length - 1"
                                        class="p-1 hover:text-theme-accent disabled:opacity-0 transition-all">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <path d="m6 9 6 6 6-6" />
                                        </svg>
                                    </button>
                                </div>
                            </div>

                            <!-- Exercise Name -->
                            <div class="lg:col-span-2">
                                <label
                                    class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-2">Name</label>
                                <input type="text" formControlName="name" placeholder="Bench Press"
                                    list="past-exercises" (change)="onExerciseSelect(i)"
                                    class="w-full bg-theme-card-hover border border-theme-border rounded-xl px-4 py-2.5 text-theme-text focus:outline-none focus:border-theme-accent border focus:border-theme-accent shadow-inner">
                            </div>

                            <!-- Muscle Group -->
                            <div>
                                <label
                                    class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-2">Target</label>
                                <select formControlName="muscle_group"
                                    class="w-full bg-theme-card-hover border border-theme-border rounded-xl px-4 py-2.5 text-theme-text focus:outline-none focus:border-theme-accent border focus:border-theme-accent appearance-none text-xs">
                                    <option value="Chest">Chest</option>
                                    <option value="Back">Back</option>
                                    <option value="Shoulders">Shoulders</option>
                                    <option value="Legs">Legs</option>
                                    <option value="Arms">Arms</option>
                                    <option value="Core">Core</option>
                                </select>
                            </div>

                            <!-- Sets -->
                            <div>
                                <label
                                    class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-2">Sets</label>
                                <input type="number" formControlName="target_sets"
                                    class="w-full bg-theme-card-hover border border-theme-border rounded-xl px-4 py-2.5 text-theme-text focus:outline-none focus:border-theme-accent border focus:border-theme-accent text-center">
                            </div>

                            <!-- Target Weight -->
                            <div>
                                <label
                                    class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-2">Weight
                                    kg</label>
                                <input type="number" formControlName="target_weight"
                                    class="w-full bg-theme-card-hover border border-theme-border rounded-xl px-4 py-2.5 text-theme-text focus:outline-none focus:border-theme-accent border focus:border-theme-accent text-center">
                            </div>
                        </div>

                        <!-- Action Bar -->
                        <div class="mt-6 pt-6 border-t border-theme-border flex items-center justify-between">
                            <div class="flex-1 mr-4">
                                <label
                                    class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-2">Form
                                    Video URL (Optional)</label>
                                <input type="text" formControlName="video_url" placeholder="YouTube link..."
                                    class="w-full bg-theme-card-hover border border-theme-border rounded-xl px-4 py-2 text-xs text-slate-400 focus:outline-none">
                            </div>
                            <!-- Added target_reps hidden or small for completeness? 
                                 Wait, reps were missing in my replacement! I need to include them. -->
                            <div class="mr-6">
                                <label
                                    class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-2">Reps</label>
                                <input type="number" formControlName="target_reps"
                                    class="w-16 bg-theme-card-hover border border-theme-border rounded-xl px-2 py-2 text-theme-text focus:outline-none text-center">
                            </div>

                            <button type="button" (click)="removeExercise(i)"
                                class="text-rose-500 hover:text-rose-400 p-2 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M3 6h18" />
                                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                                    <line x1="10" x2="10" y1="11" y2="17" />
                                    <line x1="14" x2="14" y1="11" y2="17" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Empty State -->
                <div *ngIf="exercises.length === 0"
                    class="text-center py-20 bg-[#12131a]/30 border-2 border-dashed border-theme-border rounded-2xl">
                    <p class="text-slate-500">No exercises added yet. Start building your routine!</p>
                    <button type="button" (click)="addExercise()"
                        class="mt-4 text-theme-accent font-bold hover:text-theme-accent transition-colors underline underline-offset-4">Add
                        your first exercise</button>
                </div>
            </div>

            <!-- Global Actions -->
            <div class="pt-10 flex items-center justify-end space-x-4">
                <button type="button" (click)="goBack()"
                    class="px-8 py-4 text-theme-text-muted hover:text-theme-text font-bold transition-all">Cancel</button>
                <button type="submit" [disabled]="!planForm.valid || exercises.length === 0"
                    class="disabled:opacity-50 disabled:cursor-not-allowed px-12 py-4 btn-primary transition-all">
                    Save Routine
                </button>
            </div>
        </form>
    </div>
</div>
