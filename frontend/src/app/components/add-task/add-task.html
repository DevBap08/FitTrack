<div class="card-elevated p-8 mb-8 bg-theme-bg border border-theme-border">
    <div class="flex items-center space-x-3 mb-8">
        <div class="w-8 h-8 rounded-lg bg-indigo-500/20 flex items-center justify-center">
            <span class="text-indigo-400 font-bold text-xl">+</span>
        </div>
        <h3 class="text-xl font-bold text-white uppercase tracking-wider font-display">New Task</h3>
    </div>

    <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" class="space-y-8">
        <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-3">Title</label>
            <input formControlName="title" type="text"
                class="w-full px-5 py-4 bg-[#1a1b24] border border-white/5 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:ring-1 focus:ring-indigo-500/50 transition-all font-medium"
                placeholder="What needs to be done?">
        </div>

        <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-3">Note</label>
            <textarea formControlName="description" rows="3"
                class="w-full px-5 py-4 bg-[#1a1b24] border border-white/5 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:ring-1 focus:ring-indigo-500/50 transition-all font-medium"
                placeholder="Optional details..."></textarea>
        </div>

        <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4">Priority</label>
            <div class="flex items-center space-x-2">
                <button type="button" (click)="taskForm.patchValue({priority: 'Low'})"
                    [class]="taskForm.get('priority')?.value === 'Low' ? 'bg-slate-700 text-white' : 'bg-[#1a1b24] text-slate-500 hover:text-slate-300'"
                    class="flex-1 py-1.5 px-3 rounded-full text-[10px] font-bold uppercase transition-all border border-white/5">
                    • Low
                </button>
                <button type="button" (click)="taskForm.patchValue({priority: 'Medium'})"
                    [class]="taskForm.get('priority')?.value === 'Medium' ? 'bg-amber-500/20 text-amber-500 border-amber-500/30' : 'bg-[#1a1b24] text-slate-500 hover:text-slate-300'"
                    class="flex-1 py-1.5 px-3 rounded-full text-[10px] font-bold uppercase transition-all border border-white/5 ring-1 ring-amber-500/50">
                    • Medium
                </button>
                <button type="button" (click)="taskForm.patchValue({priority: 'High'})"
                    [class]="taskForm.get('priority')?.value === 'High' ? 'bg-rose-500/20 text-rose-500 border-rose-500/30' : 'bg-[#1a1b24] text-slate-500 hover:text-slate-300'"
                    class="flex-1 py-1.5 px-3 rounded-full text-[10px] font-bold uppercase transition-all border border-white/5">
                    • High
                </button>
            </div>
        </div>

        <button type="submit" [disabled]="taskForm.invalid"
            class="w-full py-4 px-6 btn-premium text-white font-bold rounded-xl disabled:opacity-30 transition-all flex items-center justify-center space-x-2 uppercase tracking-widest text-xs">
            <span>+ Create Task</span>
        </button>
    </form>
</div>
