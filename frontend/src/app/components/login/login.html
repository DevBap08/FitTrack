<div class="min-h-screen flex items-center justify-center bg-slate-950 px-4">
  <div class="max-w-md w-full space-y-8 p-8 bg-slate-900 rounded-2xl border border-slate-800 shadow-2xl">
    <div class="text-center">
      <h2 class="mt-6 text-3xl font-extrabold text-white">Welcome Back</h2>
      <p class="mt-2 text-sm text-slate-400">Please sign in to your account</p>
    </div>

    <form class="mt-8 space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="space-y-4">
        <div>
          <label for="username" class="block text-sm font-medium text-slate-300">Username</label>
          <input id="username" formControlName="username" type="text" required
            class="mt-1 block w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
            placeholder="johndoe">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-slate-300">Password</label>
          <input id="password" formControlName="password" type="password" required
            class="mt-1 block w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
            placeholder="••••••••">
        </div>
      </div>

      <div *ngIf="error" class="text-red-500 text-sm text-center font-medium">
        {{ error }}
      </div>

      <div>
        <button type="submit" [disabled]="loginForm.invalid || isLoading()"
          class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg shadow-indigo-500/30">
          {{ isLoading() ? 'Signing in...' : 'Sign In' }}
        </button>
      </div>
    </form>

    <div class="text-center">
      <p class="text-sm text-slate-400">
        Don't have an account?
        <a routerLink="/register" class="font-medium text-indigo-400 hover:text-indigo-300 transition-colors">Sign
          up</a>
      </p>
    </div>
  </div>
</div>
