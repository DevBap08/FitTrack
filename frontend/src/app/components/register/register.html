<div class="min-h-screen flex items-center justify-center bg-slate-950 px-4">
    <div class="max-w-md w-full space-y-8 p-8 bg-slate-900 rounded-2xl border border-slate-800 shadow-2xl">
        <div class="text-center">
            <h2 class="mt-6 text-3xl font-extrabold text-white">Create Account</h2>
            <p class="mt-2 text-sm text-slate-400">Join the Life Tracker family</p>
        </div>

        <form class="mt-8 space-y-6" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            <div class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-300">Username</label>
                    <input id="username" formControlName="username" type="text" required
                        class="mt-1 block w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                        placeholder="johndoe">
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-300">Email Address</label>
                    <input id="email" formControlName="email" type="email" required
                        class="mt-1 block w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                        placeholder="john@example.com">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-300">Password</label>
                    <input id="password" formControlName="password" type="password" required
                        class="mt-1 block w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                        placeholder="••••••••">
                </div>
            </div>

            <div *ngIf="error" class="text-red-500 text-sm text-center font-medium">
                {{ error }}
            </div>

            <div>
                <button type="submit" [disabled]="registerForm.invalid || isLoading()"
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-lg text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg shadow-emerald-500/30">
                    {{ isLoading() ? 'Signing up...' : 'Sign Up' }}
                </button>
            </div>
        </form>

        <div class="text-center">
            <p class="text-sm text-slate-400">
                Already have an account?
                <a routerLink="/login"
                    class="font-medium text-emerald-400 hover:text-emerald-300 transition-colors">Sign in</a>
            </p>
        </div>
    </div>
</div>
